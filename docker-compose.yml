version: '3.8'

services:
  # Prometheus Service
  prometheus:
    build:
      context: ./prometheus
      dockerfile: Dockerfile
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    networks:
      - monitoring
    restart: unless-stopped

  # Grafana Service
  grafana:
    build:
      context: ./grafana
      dockerfile: Dockerfile
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring
    restart: unless-stopped
    depends_on:
      - prometheus

  # Node Exporter Service
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - monitoring
    restart: unless-stopped

  # Ecommerce Demo App
  ecommerce-app:
    build:
      context: ./ecommerce-app
      dockerfile: Dockerfile
    container_name: ecommerce-app
    ports:
      - "8001:8001"
    networks:
      - monitoring
    restart: unless-stopped

  # Weather Demo App
  weather-app:
    build:
      context: ./weather-app
      dockerfile: Dockerfile
    container_name: weather-app
    ports:
      - "8002:8002"
    networks:
      - monitoring
    restart: unless-stopped

  # Social Demo App
  social-app:
    build:
      context: ./social-app
      dockerfile: Dockerfile
    container_name: social-app
    ports:
      - "8003:8003"
    networks:
      - monitoring
    restart: unless-stopped

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
